name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      ui: ${{ steps.filter.outputs.ui }}
      infra: ${{ steps.filter.outputs.infra }}
      deploy_api: ${{ steps.filter.outputs.deploy_api }}
      deploy_ui: ${{ steps.filter.outputs.deploy_ui }}
      deploy_infra: ${{ steps.filter.outputs.deploy_infra }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - id: filter
        name: Classify changed files
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          if [[ "$EVENT_NAME" == workflow_dispatch ]]; then
            # Manual runs validate everything.
            for flag in api ui infra deploy_api deploy_ui deploy_infra; do
              echo "$flag=true" >> "$GITHUB_OUTPUT"
            done
            exit 0
          fi
          if [[ "$BASE_SHA" =~ ^0+$ ]]; then
            files="$(git ls-files)"
          else
            files="$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")"
          fi

          api=false ui=false infra=false
          deploy_api=false deploy_ui=false deploy_infra=false
          while IFS= read -r file; do
            case "$file" in
              azure_rag/*|main.py|Dockerfile|pyproject.toml|uv.lock)
                api=true; deploy_api=true ;;
              ui/*.test.ts|ui/*.test.tsx|ui/src/test/*|ui/vitest.config.ts)
                ui=true ;;
              ui/*)
                ui=true; deploy_ui=true ;;
              infra/*)
                infra=true; deploy_infra=true ;;
              tests/test_infra*)
                api=true; infra=true ;;
              tests/*)
                api=true ;;
              .github/workflows/*)
                api=true; ui=true; infra=true ;;
            esac
          done <<< "$files"

          echo "api=$api" >> "$GITHUB_OUTPUT"
          echo "ui=$ui" >> "$GITHUB_OUTPUT"
          echo "infra=$infra" >> "$GITHUB_OUTPUT"
          echo "deploy_api=$deploy_api" >> "$GITHUB_OUTPUT"
          echo "deploy_ui=$deploy_ui" >> "$GITHUB_OUTPUT"
          echo "deploy_infra=$deploy_infra" >> "$GITHUB_OUTPUT"
          printf 'Changed files:\n%s\n' "$files"

  validate-api:
    name: Validate API
    needs: changes
    if: needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install uv && uv sync --frozen
      - name: Install Bicep used by the full test suite
        run: az bicep install
      - name: Test
        run: uv run pytest
      - name: Validate production image
        run: docker build --tag azure-rag-api:ci .

  validate-ui:
    name: Validate UI
    needs: changes
    if: needs.changes.outputs.ui == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run lint
      - run: npm run build
      - name: Validate production image
        run: docker build --tag azure-rag-ui:ci .

  validate-infra:
    name: Validate infrastructure
    needs: changes
    if: needs.changes.outputs.infra == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install uv && uv sync --frozen
      - name: Install Bicep
        run: az bicep install
      - name: Compile templates
        run: |
          az bicep build --file infra/bootstrap.bicep --stdout >/dev/null
          az bicep build --file infra/main.bicep --stdout >/dev/null
      - name: Test infrastructure
        run: uv run pytest tests/test_infra_static.py tests/test_infra_scripts.py

  gate:
    name: CI gate
    if: always()
    needs: [changes, validate-api, validate-ui, validate-infra]
    runs-on: ubuntu-latest
    steps:
      - name: Require every applicable validation
        env:
          CHANGES: ${{ needs.changes.result }}
          API: ${{ needs.validate-api.result }}
          UI: ${{ needs.validate-ui.result }}
          INFRA: ${{ needs.validate-infra.result }}
        run: |
          set -euo pipefail
          for result in "$CHANGES" "$API" "$UI" "$INFRA"; do
            [[ "$result" == success || "$result" == skipped ]] || exit 1
          done

